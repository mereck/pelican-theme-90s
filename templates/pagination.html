{% if DEFAULT_PAGINATION %}
<div class="pagination">
    {% if articles_page.has_previous() %}
        <a href="{{ SITEURL }}/{{ articles_previous_page.url }}">&lsaquo; Prev</a>
    {% endif %}
    <span class="current">Page {{ articles_page.number }} of {{ articles_paginator.num_pages }}</span>
    {% if articles_page.has_next() %}
        <a href="{{ SITEURL }}/{{ articles_next_page.url }}">Next &rsaquo;</a>
    {% endif %}
</div>
{% endif %}
